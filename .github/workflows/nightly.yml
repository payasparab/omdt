name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch: {}   # allow manual trigger

jobs:
  # ---------------------------------------------------------------
  # 1. Full CI suite
  # ---------------------------------------------------------------
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ---------------------------------------------------------------
  # 2. Extended test suites
  # ---------------------------------------------------------------
  extended-tests:
    name: Integration, E2E & coverage
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Integration tests
        run: pytest tests/integration/ -q

      - name: E2E smoke tests
        run: pytest tests/e2e/ -q

      - name: Coverage report
        run: |
          pytest tests/ --cov=app --cov-report=html --cov-report=xml -q
          echo "Coverage report generated in htmlcov/"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-coverage
          path: |
            htmlcov/
            coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------
  # 3. Dependency freshness
  # ---------------------------------------------------------------
  dependency-freshness:
    name: Dependency freshness check
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check for outdated packages
        run: pip list --outdated --format=columns || true

      - name: Security audit
        run: pip-audit
